de: [
// Modul 1: Charakter & Werte (Sorular 1-15)
["Sie würden auf eine lukrative berufliche Chance verzichten, wenn diese im Widerspruch zu Ihren persönlichen Werten steht.","Ethische Grundsätze sind für Sie wichtiger als jeder kurzfristige finanzielle Gewinn.","Bei unfairen Beförderungsprozessen in Ihrem Umfeld setzen Sie sich aktiv für Gerechtigkeit ein.","Erfolg, der durch Unwahrheiten erzielt wurde, gibt Ihnen keine persönliche Erfüllung.","Es fällt Ihnen leichter, eigene Fehler einzugestehen, als die Schuld bei anderen zu suchen.","In einer Arbeitsbeziehung ist Ihnen gegenseitiges Vertrauen wichtiger als die bloße Gehaltshöhe.","Sie sprechen Fehlentscheidungen von Führungskräften direkt und sachlich an.","Die Ausrede 'Das machen doch alle' rechtfertigt für Sie kein unethisches Verhalten.","Die Werte Ihrer Organisation müssen zwingend mit Ihren persönlichen Überzeugungen übereinstimmen.","Sie kommunizieren eigene Fehler lieber offen, anstatt sie zu vertuschen.","Sie sind bereit, auf eigene Vorteile zu verzichten, um die Rechte anderer zu schützen.","Transparenz führt Ihrer Meinung nach langfristig immer zu besseren Ergebnissen als Geheimhaltung.","Auch unter starkem sozialen Druck treffen Sie keine Entscheidungen gegen Ihre inneren Werte.","Bei wichtigen Entscheidungen fragen Sie sich zuerst 'Ist das richtig?', bevor Sie fragen 'Bringt das Gewinn?'.","Für ein würdevolles und ehrenhaftes Leben akzeptieren Sie auch ein geringeres Einkommen."],
// Modul 2: Kognitive Fähigkeiten (Sorular 46-60 tabloda) – bizim M2
["Bei komplexen Problemen zerlegen Sie die Aufgabenstellung zuerst systematisch in Einzelteile.","In Krisensituationen bewahren Sie Ruhe und treffen schnelle, präzise Entscheidungen.","Die Arbeit mit Zahlen und Daten fühlt sich für Sie wie ein interessantes Rätsel an.","Es fällt Ihnen leicht, sich schnell an technologische Veränderungen anzupassen.","Langfristige Ziele und Strategien sind Ihnen wichtiger als kurzfristige Erfolge.","Kritisches Hinterfragen ist ein fester Bestandteil Ihres Denkprozesses im Alltag.","In unsicheren Situationen stützen Sie sich auf logische Einschätzungen, um voranzukommen.","Auch unter Zeitdruck behalten Sie Ihre systematische Arbeitsweise bei.","Sie besitzen die Fähigkeit, komplexe Themen auch für Laien einfach zu erklären.","Unkonventionelle Lösungen zu finden („Out of the box“), bereitet Ihnen Freude.","Feedback sehen Sie primär als Chance zur Entwicklung, nicht als persönlichen Angriff.","Große Ziele in realistische Teilschritte zu unterteilen, gehört zu Ihren Stärken.","Sie kombinieren Wissen aus verschiedenen Fachbereichen, um neue Lösungen zu generieren.","Die Analyse von Fehlern weckt Ihre Neugier, anstatt Ihnen unangenehm zu sein.","Sie testen neues Wissen gedanklich durch, bevor Sie es in die Praxis umsetzen."],
// Modul 3: Berufliche Leidenschaft (Sorular 61-75 tabloda) – bizim M3
["Es gibt Tätigkeitsfelder, bei denen Sie völlig das Zeitgefühl verlieren.","Bei abgeschlossenen Projekten motiviert Sie der erreichte Nutzen mehr als äußeres Lob.","Sie bevorzugen eine Arbeit, bei der Sie jeden Tag etwas Neues dazulernen können.","Die Schaffung eines konkreten Mehrwerts ist Ihr größter Antrieb.","Es fällt Ihnen leicht, andere Menschen zu führen und zu inspirieren.","Das Forschen und Entdecken neuer Erkenntnisse gibt Ihnen berufliche Erfüllung.","Unternehmertum und der Aufbau von etwas völlig Neuem begeistern Sie.","Eine Tätigkeit im Gesundheits- oder Sozialwesen empfinden Sie als sehr sinnvoll.","Softwareentwicklung oder technologische Innovationen zählen zu Ihren Kerninteressen.","Wissen zu vermitteln und andere zu bilden, gibt Ihrer Arbeit einen tiefen Sinn.","Führungspositionen betrachten Sie eher als Chance denn als Last.","Für berufliche Zufriedenheit müssen Sie eine positive Wirkung auf die Gesellschaft sehen.","Ein anerkannter Experte in einem Spezialgebiet zu sein, ist für Sie reizvoller als oberflächliches Allgemeinwissen.","Zur persönlichen Entwicklung anderer beizutragen, erfüllt Sie beruflich sehr.","Wenn finanzielle Mittel unbegrenzt wären, wüssten Sie genau, welcher Aufgabe Sie morgen nachgehen würden."],
// Modul 4: Soziale Ethik & Verantwortung (Sorular 16-30 tabloda) – bizim M4
["Es würde Ihnen Unbehagen bereiten, eine Auszeichnung anzunehmen, die Sie nicht verdient haben.","Bei Personalentscheidungen sollte die tatsächliche Leistung entscheidender sein als bloße Betriebszugehörigkeit.","Projekte, die benachteiligte gesellschaftliche Gruppen unterstützen, begeistern Sie besonders.","Sie sehen es als Ihre Verantwortung an, aktiv zur Reduzierung von Ungleichheiten beizutragen.","Der gesellschaftliche Beitrag einer Branche ist für Sie ein entscheidendes Kriterium bei der Berufswahl.","Leistungsbewertung ohne echte Chancengleichheit ist in Ihren Augen wertlos.","Wenn Sie Ungerechtigkeit beobachten, ergreifen Sie Maßnahmen, um eine Veränderung herbeizuführen.","Fragen des Klimaschutzes und der Umwelt beeinflussen Ihre beruflichen Entscheidungen maßgeblich.","Themen wie Migration und Integration interessieren Sie sowohl persönlich als auch beruflich.","Die Überbrückung der digitalen Kluft ist ein Problem, das dringend gelöst werden muss.","Das Wohl der Mitarbeiter sollte für ein Unternehmen vor der reinen Aktionärsrendite stehen.","Soziales Unternehmertum halten Sie für sinnvoller als rein traditionelle Geschäftsmodelle.","Die Einkommensungleichheit in der Gesellschaft beunruhigt Sie persönlich und beruflich.","Messbaren sozialen Nutzen zu stiften, ist eine Kernmotivation Ihrer Karriere.","Ein Beruf mit hohem Gehalt, aber ohne gesellschaftlichen Nutzen, kommt für Sie nicht infrage."],
// Modul 5: Handwerk & Fachkompetenz (Sorular 31-45 tabloda) – bizim M5
["Wenn Sie etwas mit Ihren eigenen Händen erschaffen, empfinden Sie tiefe Zufriedenheit.","Defekte Gegenstände zu reparieren, sehen Sie als eine willkommene Herausforderung an.","Handwerkliche Tätigkeiten oder der Aufbau von Möbeln bereiten Ihnen Freude.","Sie verstehen ein Werkzeug am besten, indem Sie es direkt in der Praxis ausprobieren.","Sie arbeiten lieber an physischen Objekten als ausschließlich vor dem Computer zu sitzen.","Um Maschinen zu verstehen, experimentieren Sie lieber praktisch, anstatt lange Handbücher zu lesen.","Kurse in Bereichen wie Schreinerei, Elektrik oder Mechanik wecken Ihr Interesse.","Die Vorstellung, Ihr eigener Chef zu sein, begeistert Sie.","Sie haben den Ehrgeiz, ein Handwerk zu meistern und eventuell eine eigene Werkstatt zu führen.","Das Erlernen neuer Werkzeuge oder moderner Maschinen bereitet Ihnen Vergnügen.","Lernen in einer klassischen Meister-Lehrling-Beziehung halten Sie für ideal.","Sie achten bei Ihrer Arbeit penibel auf kleinste Details.","Qualität ist Ihnen bei einem Ergebnis wichtiger als die reine Geschwindigkeit der Umsetzung.","Für die Langlebigkeit eines Produkts investieren Sie gerne zusätzlichen Aufwand.","Sie möchten Arbeit in einer Qualität abliefern, hinter der Sie mit Stolz stehen können."],
// Modul 6: Wohlbefinden & Lebensqualität (Sorular 76-90 tabloda) – bizim M6
["Selbst in stressigen Phasen achten Sie konsequent auf Ihren Schlafrhythmus.","Regelmäßige körperliche Bewegung ist für Sie ein Grundbedürfnis, keine Pflicht.","Eine ausgewogene Work-Life-Balance ist für Sie eine unverhandelbare Grenze.","Ihnen ist bewusst, dass Ihre emotionale Verfassung Ihre Arbeitsleistung direkt beeinflusst.","Sie sind davon überzeugt, dass Ernährungsgewohnheiten Ihre langfristige Gesundheit prägen.","Bei starkem Stress nehmen Sie die Signale Ihres Körpers sehr bewusst wahr.","Psychische Gesundheit ist für Sie genauso wichtig wie physische Fitness.","Regelmäßige Gesundheitschecks haben für Sie eine hohe Priorität.","Sie glauben, dass viele chronische Krankheiten direkt mit dem Lebensstil zusammenhängen.","Bewusste Zeiten ohne digitale Bildschirme tun Ihnen spürbar gut.","Starke soziale Bindungen sind für Sie essenziell für die psychische Stabilität.","Eine gute Gesundheit ist für Sie die Grundvoraussetzung für beruflichen Erfolg.","Kurze Pausen während des Arbeitstages steigern Ihre Produktivität messbar.","Investitionen in die eigene Gesundheit halten Sie für die beste aller Investitionen.","Gesundheitskompetenz ist für Sie eine grundlegende Fähigkeit, die jeder besitzen sollte."]
]
};

var LIKERT_LABELS = {
tr: ["Kesinlikle Katılmıyorum","Katılmıyorum","Kararsızım","Katılıyorum","Kesinlikle Katılıyorum"],
en: ["Strongly Disagree","Disagree","Neutral","Agree","Strongly Agree"],
de: ["Stimme gar nicht zu","Stimme nicht zu","Unentschieden","Stimme zu","Stimme voll zu"]
};
var LIKERT_VALUES = [0, 1.25, 2.5, 3.75, 5];

var lang = "tr";
var state = "lang";
var modAnswers = [[],[],[],[],[],[]];
var curMod = 0;
var curQ = 0;
var modScores = [0,0,0,0,0,0];

function getView() { return document.getElementById("dynamicView"); }

function render(noScroll) {
var v = getView();
if (!v) return;
if (state === "lang") renderLang(v);
else if (state === "entry") renderEntry(v);
else if (state === "module") renderModule(v);
else if (state === "inter") renderInter(v);
else if (state === "report") renderReport(v);
if (!noScroll) window.scrollTo(0, 0);
}

function renderLang(v) {
var t = lang === "tr" ? "6 modül, 90 soru ile kariyer profilinizi keşfedin." :
lang === "de" ? "Entdecken Sie Ihr Karriereprofil mit 6 Modulen, 90 Fragen." :
"Discover your career profile with 6 modules, 90 questions.";
var btn = lang === "tr" ? "Başla" : lang === "de" ? "Starten" : "Start";
v.innerHTML = '<div class="lang-selector">'
+ '<button class="lang-btn ' + (lang==='tr'?'active':'') + '" onclick="setLang(\'tr\')">🇹🇷 TÜRKÇE</button>'
+ '<button class="lang-btn ' + (lang==='de'?'active':'') + '" onclick="setLang(\'de\')">🇩🇪 DEUTSCH</button>'
+ '<button class="lang-btn ' + (lang==='en'?'active':'') + '" onclick="setLang(\'en\')">🇬🇧 ENGLISH</button>'
+ '</div>'
+ '<div class="start-card">'
+ '<h2>🧭 NavigoPro | PACDI</h2>'
+ '<p>' + t + '</p>'
+ '<button class="btn-primary" onclick="goEntry()">' + btn + '</button>'
+ '</div>';
}

function setLang(l) { lang = l; render(); }
function goEntry() { state = "entry"; render(); }

function renderEntry(v) {
var title = lang==="tr" ? "Kariyer Değerlendirmesine Hoş Geldiniz" :
lang==="de" ? "Willkommen zur Karrierebewertung" : "Welcome to Career Assessment";
var desc = lang==="tr" ? "6 modül, her biri 15 soru. Geri dönüp cevapları değiştirebilirsiniz." :
lang==="de" ? "6 Module, je 15 Fragen. Sie können zurück und Antworten ändern." :
"6 modules, 15 questions each. You can go back and change answers.";
var btn = lang==="tr" ? "Modül 1'e Başla" : lang==="de" ? "Modul 1 starten" : "Start Module 1";
v.innerHTML = '<div class="start-card"><h2>📋 ' + title + '</h2><p>' + desc + '</p>'
+ '<button class="btn-primary" onclick="goModule()">' + btn + '</button></div>';
}

function goModule() { curMod = 0; curQ = 0; modAnswers = [[],[],[],[],[],[]]; state = "module"; render(); }

function renderModule(v) {
var qText = QUESTIONS[lang][curMod][curQ];
var selVal = modAnswers[curMod][curQ];
var pct = (curQ / 15) * 100;
var modName = MODULE_NAMES[lang][curMod];
var icon = MODULE_ICONS[curMod];
var isLast = curQ === 14;
var nextLbl = isLast ? (lang==="tr"?"Modülü Bitir":lang==="de"?"Modul abschliessen":"Finish Module") :
(lang==="tr"?"İleri →":lang==="de"?"Weiter →":"Next →");
var backLbl = lang==="tr" ? "← Geri" : lang==="de" ? "← Zurück" : "← Back";
var modLbl = lang==="tr" ? "Modül " + (curMod+1) + "/6" : "Module " + (curMod+1) + "/6";
var qLbl = lang==="tr" ? "Soru " + (curQ+1) + " / 15" : "Question " + (curQ+1) + " / 15";

var optsHtml = LIKERT_LABELS[lang].map(function(lbl, idx) {
    var val = LIKERT_VALUES[idx];
    var sel = selVal !== undefined && Math.abs(selVal - val) < 0.01;
    return '<div class="option' + (sel?' selected':'') + '" onclick="selectOpt(' + val + ')">' + lbl + '</div>';
}).join('');

v.innerHTML = '<div class="module-header">'
    + '<div style="display:flex;align-items:center;gap:10px">'
    + '<span class="module-icon">' + icon + '</span>'
    + '<span class="module-title">' + modName + '</span>'
    + '</div>'
    + '<span style="color:#5b7a97;font-size:0.9rem">' + modLbl + '</span>'
    + '</div>'
    + '<div class="progress-area"><div class="progress-fill" style="width:' + pct + '%"></div></div>'
    + '<div class="q-counter">' + qLbl + '</div>'
    + '<div class="question-text">' + qText + '</div>'
    + '<div class="options">' + optsHtml + '</div>'
    + '<div class="nav-buttons">'
    + '<button class="btn-nav" onclick="goBack()" ' + (curQ===0?'disabled':'') + ' style="' + (curQ===0?'opacity:0.4':'') + '">' + backLbl + '</button>'
    + '<button class="btn-nav btn-next" onclick="goNext()">' + nextLbl + '</button>'
    + '</div>'
    + '<div class="warning" id="warn"></div>';
}

function selectOpt(val) {
modAnswers[curMod][curQ] = val;
render(true);
}

function goBack() {
if (curQ > 0) { curQ = curQ - 1; render(); }
}

function goNext() {
if (modAnswers[curMod][curQ] === undefined) {
var warn = document.getElementById("warn");
if (warn) warn.textContent = lang==="tr" ? "Lütfen bir cevap seçin." :
lang==="de" ? "Bitte wählen Sie eine Antwort." :
"Please select an answer.";
return;
}
if (curQ === 14) {
var sum = 0;
for (var i = 0; i < modAnswers[curMod].length; i++) { sum += modAnswers[curMod][i]; }
modScores[curMod] = sum / 15;
state = "inter";
render();
} else {
curQ = curQ + 1;
render();
}
}

function shareApp() {
var shareTitle = lang==="tr" ? "NavigoPro | Kariyer Testi" :
                 lang==="de" ? "NavigoPro | Karrieretest" : "NavigoPro | Career Test";
var shareText = lang==="tr" ? "Kariyer profilini keşfet! 6 modül, 90 soru, ücretsiz." :
                lang==="de" ? "Entdecke dein Karriereprofil! 6 Module, 90 Fragen, kostenlos." :
                "Discover your career profile! 6 modules, 90 questions, free.";
if (navigator.share) {
    navigator.share({ title: shareTitle, text: shareText, url: "https://www.navigopro.de" });
} else {
    navigator.clipboard.writeText("https://www.navigopro.de").then(function() {
        alert(lang==="tr" ? "Link kopyalandı!" : lang==="de" ? "Link kopiert!" : "Link copied!");
    }).catch(function() {
        alert(lang==="tr" ? "Kopyalama başarısız." : lang==="de" ? "Kopieren fehlgeschlagen." : "Copy failed.");
    });
}
}

function renderInter(v) {
var score = modScores[curMod];
var msgs = {
tr: ["Harika ilerliyorsun! 💪","Kendini tanımaya devam et 🌟","Güçlü yönlerin ortaya çıkıyor ✨"],
de: ["Grossartig! Weiter so 💪","Erkenne dich selbst 🌟","Deine Stärken werden sichtbar ✨"],
en: ["Great progress! 💪","Keep discovering yourself 🌟","Your strengths are emerging ✨"]
};
var msg = msgs[lang][Math.floor(Math.random() * 3)];
var title = lang==="tr" ? "Modül " + (curMod+1) + " Tamamlandı ✅" :
lang==="de" ? "Modul " + (curMod+1) + " abgeschlossen ✅" :
"Module " + (curMod+1) + " Completed ✅";
var nextBtn = curMod < 5 ?
(lang==="tr" ? "Modül " + (curMod+2) + "'ye Geç →" : lang==="de" ? "Modul " + (curMod+2) + " starten →" : "Start Module " + (curMod+2) + " →") :
(lang==="tr" ? "Raporu Görüntüle →" : lang==="de" ? "Bericht anzeigen →" : "View Report →");

v.innerHTML = '<div class="inter-card">'
    + '<h3>' + title + '</h3>'
    + '<div class="score-circle" id="animScore">0.0</div>'
    + '<p class="motivation">' + msg + '</p>'
    + '<button class="btn-primary" onclick="goNextMod()">' + nextBtn + '</button>'
    + '</div>';

var animVal = 0;
var interval = setInterval(function() {
    var el = document.getElementById("animScore");
    if (!el) { clearInterval(interval); return; }
    if (animVal + 0.15 >= score) {
        el.textContent = score.toFixed(1);
        clearInterval(interval);
    } else {
        animVal += 0.15;
        el.textContent = animVal.toFixed(1);
    }
}, 20);
}

function goNextMod() {
if (curMod < 5) { curMod++; curQ = 0; state = "module"; render(); }
else { state = "report"; render(); }
}

function renderReport(v) {
var avg = 0;
for (var i = 0; i < modScores.length; i++) { avg += modScores[i]; }
avg = avg / 6;

var thr = [4.0, 4.0, 4.0, 4.0, 3.5, 4.0];
var high = [];
for (var i = 0; i < modScores.length; i++) {
    if (modScores[i] >= thr[i]) high.push(i);
}

var profileNames = {
    tr: ["Etik Lider","Analitik Düşünür","Tutkulu Profesyonel","Sosyal Dönüştürücü","Usta Adayı","Bilinçli Yaşam Savunucusu"],
    en: ["Ethical Leader","Analytical Thinker","Passionate Professional","Social Transformer","Craft Master Candidate","Conscious Living Advocate"],
    de: ["Ethische Führungskraft","Analytischer Denker","Leidenschaftlicher Profi","Sozialer Transformator","Meister-Anwärter","Bewusster Lebensadvokat"]
};

var profileName;
if (high.length === 1) {
    profileName = profileNames[lang][high[0]];
} else if (high.length > 1) {
    var parts = [];
    for (var i = 0; i < high.length; i++) { parts.push(MODULE_NAMES[lang][high[i]].split(" ")[0]); }
    profileName = parts.join(" + ") + (lang==="tr" ? " Bileşik Profili" : lang==="de" ? " Kombiniertes Profil" : " Combined Profile");
} else {
    profileName = lang==="tr" ? "Gelişim Odaklı Profil" : lang==="de" ? "Entwicklungsorientiertes Profil" : "Growth-Oriented Profile";
}

var careerMap = {
    tr: ["Etik Danışmanlık, Kurumsal Yönetişim","Veri Analizi, Stratejik Planlama","Girişimcilik, Yaratıcı Endüstriler","Sivil Toplum, Kamu Politikası","Ustalık Girişimciliği, Teknik Tasarım","Sağlık Yönetimi, Wellness Koçluğu"],
    en: ["Ethics Consulting, Corporate Governance","Data Analysis, Strategic Planning","Entrepreneurship, Creative Industries","Civil Society, Public Policy","Craft Entrepreneurship, Technical Design","Health Management, Wellness Coaching"],
    de: ["Ethikberatung, Corporate Governance","Datenanalyse, Strategische Planung","Unternehmertum, Kreativwirtschaft","Zivilgesellschaft, Öffentliche Politik","Handwerksunternehmertum, Technisches Design","Gesundheitsmanagement, Wellness-Coaching"]
};

var careers = [];
if (high.length > 0) {
    for (var i = 0; i < high.length; i++) { careers.push(careerMap[lang][high[i]]); }
} else {
    careers = [careerMap[lang][0], careerMap[lang][1], careerMap[lang][2]];
}
while (careers.length < 3) { careers.push(lang==="tr" ? "Danışmanlık, Liderlik Gelişimi" : lang==="de" ? "Beratung, Führungsentwicklung" : "Consulting, Leadership Development"); }
careers = careers.slice(0, 3);

var barsHtml = modScores.map(function(s, i) {
    return '<div class="bar-item">'
        + '<div class="bar-label">' + MODULE_ICONS[i] + ' ' + MODULE_NAMES[lang][i] + '</div>'
        + '<div class="bar-bg"><div class="bar-fill" data-w="' + (s/5*100).toFixed(0) + '" style="width:0%;background:' + MODULE_COLORS[i] + '"></div></div>'
        + '<div class="bar-score">' + s.toFixed(1) + '</div>'
        + '</div>';
}).join('');

var hwBadge = modScores[4] >= 3.5 ? {
    icon: "🔧",
    title: lang==="tr" ? "Usta Adayı Kartı" : (lang==="de" ? "Meister-Anwärter" : "Master Candidate"),
    desc: lang==="tr" ? "El becerisi ve zanaat alanında güçlü eğilim. Atölye kurma ve teknik tasarımda parlayabilirsiniz." :
           lang==="de" ? "Starke Neigung zu Handwerk. Können in Werkstattgründung aufblühen." :
           "Strong inclination for craftsmanship. Can excel in workshop creation and technical design."
} : null;

var wbBadge = modScores[5] >= 4.0 ? {
    icon: "🌿",
    title: lang==="tr" ? "Bilinçli Yaşam Kartı" : (lang==="de" ? "Bewusstes-Leben Karte" : "Conscious Living Card"),
    desc: lang==="tr" ? "Sağlık ve iyi oluş alanlarında farkındalık yüksek. Wellness ve sağlık yönetiminde doğal bir rehbersiniz." :
           lang==="de" ? "Hohes Bewusstsein für Gesundheit. Natürlicher Begleiter in Wellness und Gesundheitsmanagement." :
           "High awareness in health and well-being. A natural guide in wellness and health management."
} : null;

var specialCardsHtml = "";
if (hwBadge || wbBadge) {
    var cardsHtml = "";
    if (hwBadge) {
        cardsHtml += '<div class="special-card">'
            + '<div class="special-card-icon">' + hwBadge.icon + '</div>'
            + '<div class="special-card-content">'
            + '<div class="special-card-title">' + hwBadge.title + '</div>'
            + '<div class="special-card-desc">' + hwBadge.desc + '</div>'
            + '</div></div>';
    }
    if (wbBadge) {
        cardsHtml += '<div class="special-card">'
            + '<div class="special-card-icon">' + wbBadge.icon + '</div>'
            + '<div class="special-card-content">'
            + '<div class="special-card-title">' + wbBadge.title + '</div>'
            + '<div class="special-card-desc">' + wbBadge.desc + '</div>'
            + '</div></div>';
    }
    var cardTitle = lang==="tr" ? "Özel Yetkinlik Kartları" : lang==="de" ? "Besondere Kompetenzkarten" : "Special Competency Cards";
    specialCardsHtml = '<div class="special-cards-container"><h3>🏅 ' + cardTitle + '</h3>' + cardsHtml + '</div>';
}

var labels = lang==="tr" ?
    ["Modül Skorları","PACDI Radar","Ana Profiliniz","PACDI Genel Skor","Önerilen Kariyer Alanları","Geri Bildirim Gönder","Testi Paylaş","Arkadaşlarını da dene!"] :
    lang==="en" ?
    ["Module Scores","PACDI Radar","Your Main Profile","PACDI Overall Score","Recommended Career Areas","Send Feedback","Share Test","Recommend to friends!"] :
    ["Modul-Scores","PACDI Radar","Ihr Hauptprofil","PACDI Gesamtscore","Empfohlene Karrierefelder","Feedback senden","Test teilen","Freunden empfehlen!"];

var careerItems = careers.map(function(c) { return '<li>🎯 ' + c + '</li>'; }).join('');

var feedbackSubject = lang==="tr" ? "NavigoPro%20Geri%20Bildirim" : "NavigoPro%20Feedback";

v.innerHTML = '<div class="report-grid">'
    + '<div class="bars-container"><h3>📊 ' + labels[0] + '</h3>' + barsHtml + '</div>'
    + '<div class="radar-container"><h3>🎯 ' + labels[1] + '</h3><canvas id="radarC" width="360" height="360"></canvas></div>'
    + '<div class="profile-card">'
    + '<h3>🏆 ' + labels[2] + '</h3>'
    + '<div class="profile-name">' + profileName + '</div>'
    + '<div class="profile-score">' + labels[3] + ': <strong>' + avg.toFixed(2) + ' / 5.0</strong></div>'
    + specialCardsHtml
    + '<h4>✨ ' + labels[4] + '</h4>'
    + '<ul class="career-list">' + careerItems + '</ul>'

setTimeout(function() {
    document.querySelectorAll(".bar-fill").forEach(function(el) { el.style.width = el.dataset.w + "%"; });
    drawRadar();
}, 100);
}

function drawRadar() {
var canvas = document.getElementById("radarC");
if (!canvas) return;
var ctx = canvas.getContext("2d");
var W = 360, H = 360, cx = W/2, cy = H/2, R = 130;
canvas.width = W; canvas.height = H;
var angles = [0,60,120,180,240,300].map(function(d) { return d * Math.PI / 180 - Math.PI/2; });
var vals = modScores.map(function(s) { return s / 5; });

ctx.clearRect(0, 0, W, H);

for (var lv = 1; lv <= 5; lv++) {
    ctx.beginPath();
    angles.forEach(function(a, i) {
        var r = R * lv / 5;
        var x = cx + r * Math.cos(a), y = cy + r * Math.sin(a);
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    });
    ctx.closePath();
    ctx.strokeStyle = "#dde3ec";
    ctx.lineWidth = 1;
    ctx.stroke();
}

angles.forEach(function(a) {
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + R * Math.cos(a), cy + R * Math.sin(a));
    ctx.strokeStyle = "#dde3ec";
    ctx.stroke();
});

ctx.beginPath();
vals.forEach(function(v, i) {
    var x = cx + R * v * Math.cos(angles[i]);
    var y = cy + R * v * Math.sin(angles[i]);
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
});
ctx.closePath();
ctx.fillStyle = "rgba(4,22,46,0.15)";
ctx.fill();
ctx.strokeStyle = "#F6B45F";
ctx.lineWidth = 2.5;
ctx.stroke();

vals.forEach(function(v, i) {
    var x = cx + R * v * Math.cos(angles[i]);
    var y = cy + R * v * Math.sin(angles[i]);
    ctx.beginPath();
    ctx.arc(x, y, 5, 0, 2 * Math.PI);
    ctx.fillStyle = MODULE_COLORS[i];
    ctx.fill();
});

ctx.font = "bold 11px system-ui";
ctx.fillStyle = "#04162E";
ctx.textAlign = "center";
ctx.textBaseline = "middle";
angles.forEach(function(a, i) {
    var lx = cx + (R + 20) * Math.cos(a);
    var ly = cy + (R + 20) * Math.sin(a);
    ctx.fillText(MODULE_ICONS[i], lx, ly);
});
}

document.addEventListener("DOMContentLoaded", render);
</script>
