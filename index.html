var lang = "tr";
var state = "lang";
var answers = [];
var curQ = 0;
var benefits = [];

function getView() { return document.getElementById("dynamicView"); }

function detectLanguage() {
    var userLang = navigator.language || navigator.userLanguage;
    if (userLang.indexOf("tr") === 0) return "tr";
    if (userLang.indexOf("de") === 0) return "de";
    return "en";
}

function render() {
    var v = getView();
    if (!v) return;
    if (state === "lang") renderLang(v);
    else if (state === "quiz") renderQuiz(v);
    else if (state === "result") renderResult(v);
    window.scrollTo(0,0);
}

function renderLang(v) {
    var current = texts[lang];
    var html = '<div class="lang-selector">' +
        '<button class="lang-btn ' + (lang === 'tr' ? 'active' : '') + '" onclick="setLang(\'tr\')">🇹🇷 TÜRKÇE</button>' +
        '<button class="lang-btn ' + (lang === 'de' ? 'active' : '') + '" onclick="setLang(\'de\')">🇩🇪 DEUTSCH</button>' +
        '<button class="lang-btn ' + (lang === 'en' ? 'active' : '') + '" onclick="setLang(\'en\')">🇬🇧 ENGLISH</button>' +
        '</div>' +
        '<div class="start-card">' +
        '<h2>⚖️ ' + current.title + '</h2>' +
        '<p>' + current.desc + '</p>' +
        '<button class="btn-primary" onclick="startQuiz()">' + current.start + '</button>' +
        '</div>';
    v.innerHTML = html;
}

function setLang(l) { lang = l; render(); }

function startQuiz() {
    state = "quiz";
    curQ = 0;
    answers = [];
    for (var i = 0; i < texts[lang].questions.length; i++) answers.push(null);
    benefits = [];
    render();
}

function renderQuiz(v) {
    var t = texts[lang];
    var q = t.questions[curQ];
    var currentAnswer = answers[curQ];
    var total = t.questions.length;
    var pct = (curQ / total) * 100;
    var isLast = curQ === total - 1;
    var nextLabel = isLast ? t.finish : t.next;
    
    var optsHtml = '<div class="options">' +
        '<div class="option' + (currentAnswer === true ? ' selected' : '') + '" onclick="answer(true)">✅ ' + (lang === "tr" ? "Evet" : (lang === "de" ? "Ja" : "Yes")) + '</div>' +
        '<div class="option' + (currentAnswer === false ? ' selected' : '') + '" onclick="answer(false)">❌ ' + (lang === "tr" ? "Hayır" : (lang === "de" ? "Nein" : "No")) + '</div>' +
        '</div>';
    
    var html = '<div class="progress-area"><div class="progress-fill" style="width:' + pct + '%"></div></div>' +
        '<div class="q-counter">' + (curQ+1) + ' / ' + total + '</div>' +
        '<div class="question-text">' + q.text + '</div>' +
        optsHtml +
        '<div class="nav-buttons">' +
        '<button class="btn-nav" onclick="prevQuestion()"' + (curQ === 0 ? ' disabled' : '') + '>' + t.back + '</button>' +
        '<button class="btn-nav btn-next" onclick="nextQuestion()">' + nextLabel + '</button>' +
        '</div>' +
        '<div class="warning" id="warn"></div>';
    v.innerHTML = html;
}

function answer(val) {
    answers[curQ] = val;
    render();
}

function prevQuestion() {
    if (curQ > 0) {
        curQ--;
        render();
    }
}

function nextQuestion() {
    if (answers[curQ] === null) {
        var warn = document.getElementById("warn");
        if (warn) warn.textContent = lang === "tr" ? "Lütfen bir cevap seçin." : (lang === "de" ? "Bitte wählen Sie eine Antwort." : "Please select an answer.");
        return;
    }
    var t = texts[lang];
    if (curQ === t.questions.length - 1) {
        benefits = [];
        for (var i = 0; i < t.questions.length; i++) {
            var q = t.questions[i];
            if (answers[i] === true && q.benefit && q.benefit !== "all") {
                if (benefits.indexOf(q.benefit) === -1) benefits.push(q.benefit);
            }
        }
        if (answers[0] === false) benefits = [];
        state = "result";
        render();
    } else {
        curQ++;
        render();
    }
}

function generateShareText() {
    var t = texts[lang];
    if (benefits.length > 0) {
        var benefitNames = [];
        for (var i = 0; i < benefits.length; i++) {
            benefitNames.push(t.results[benefits[i]]);
        }
        var listStr = benefitNames.join(", ");
        return t.share_text_prefix + listStr + t.share_text_suffix;
    } else {
        return t.share_text_fallback;
    }
}

function shareResult() {
    var t = texts[lang];
    var shareText = generateShareText();
    var fullText = shareText + " " + window.location.href;
    if (navigator.share) {
        navigator.share({
            title: t.share_title,
            text: shareText,
            url: window.location.href
        });
    } else {
        navigator.clipboard.writeText(fullText).then(function() {
            alert(lang === "tr" ? "Link kopyalandı!" : (lang === "de" ? "Link kopiert!" : "Link copied!"));
        }).catch(function() {
            alert(lang === "tr" ? "Paylaşım başarısız." : (lang === "de" ? "Teilen fehlgeschlagen." : "Sharing failed."));
        });
    }
}

function submitWaitlist() {
    var emailInput = document.getElementById("waitlist-email");
    if (!emailInput) return;
    var email = emailInput.value.trim();
    if (!email || email.indexOf("@") === -1 || email.indexOf(".") === -1) {
        alert(texts[lang].waitlist_error);
        return;
    }
    var subject = encodeURIComponent("Waitlist: " + email);
    var body = encodeURIComponent("I would like to join the EasyGov.io waitlist.\nEmail: " + email);
    window.location.href = "mailto:info@easygov.io?subject=" + subject + "&body=" + body;
    alert(texts[lang].waitlist_success);
    emailInput.value = "";
}

function renderResult(v) {
    var t = texts[lang];
    var hasBenefits = benefits.length > 0;
    var benefitsHtml = "";
    if (hasBenefits) {
        var listItems = "";
        for (var i = 0; i < benefits.length; i++) {
            var b = benefits[i];
            listItems += '<li><strong>' + t.results[b] + '</strong><br><small>📄 ' + t.docs[b] + '</small></li>';
        }
        benefitsHtml = '<ul class="benefit-list">' + listItems + '</ul>';
    } else {
        benefitsHtml = '<p>' + t.no_result + '</p>';
    }
    
    var waitlistHtml = '<div class="waitlist-container">' +
        '<h4>📧 ' + t.waitlist_title + '</h4>' +
        '<div class="waitlist-form">' +
        '<input type="email" id="waitlist-email" class="waitlist-input" placeholder="' + t.waitlist_placeholder + '">' +
        '<button class="btn-waitlist" onclick="submitWaitlist()">' + t.waitlist_button + '</button>' +
        '</div>' +
        '</div>';
    
    var html = '<div class="result-card">' +
        '<h3>📋 ' + (lang === "tr" ? "Sonuçlarınız" : (lang === "de" ? "Ihre Ergebnisse" : "Your Results")) + '</h3>' +
        benefitsHtml +
        '</div>' +
        '<div class="share-section">' +
        '<p>📣 ' + t.recommend + '</p>' +
        '<button class="btn-share" onclick="shareResult()">📢 ' + t.share + '</button>' +
        '<div style="margin-top:12px">' +
        '<a class="btn-feedback" href="mailto:info@easygov.io?subject=EasyGov.io%20Feedback">📧 ' + t.feedback + '</a>' +
        '</div>' +
        '</div>' +
        waitlistHtml +
        '<div class="disclaimer">' +
        'ℹ️ ' + (lang === "tr" ? "Bu bilgiler yalnızca bilgilendirme amaçlıdır ve resmi bir başvuru yerine geçmez. Kesin hak durumu için ilgili kurumlarla iletişime geçin." :
                   lang === "de" ? "Diese Informationen dienen nur zur Orientierung und ersetzen keine offizielle Beratung. Für verbindliche Auskünfte wenden Sie sich bitte an die zuständigen Stellen." :
                   "This information is for guidance only and does not replace official advice. Please contact the relevant authorities for definitive eligibility.") +
        '</div>' +
        '<div class="footer-note">' +
        '🚀 ' + t.beta_note + '<br>' +
        '© 2026 PACDI — easygov.io · easygovio@pacdi.de<br>' +
        'Datenschutzfreundlich · Keine Speicherung personenbezogener Daten' +
        '</div>';
    v.innerHTML = html;
}

lang = detectLanguage();
state = "lang";
document.addEventListener("DOMContentLoaded", render);
</script>
</body>
</html>
